name: Check Repository Name
description: Checks if the repository name matches the package name to prevent template-derived repositories from publishing releases.

outputs:
  should_release:
    description: Whether to proceed with the release (true/false)
    value: ${{ steps.check.outputs.should_release }}
  package_name:
    description: Package name from pyproject.toml
    value: ${{ steps.check.outputs.package_name }}

runs:
  using: composite
  steps:
    - name: Check if repository name matches package name
      id: check
      run: |
        PACKAGE_NAME=$(uv run ci-pyproject-name)
        REPO_NAME="${{ github.repository }}"
        REPO_NAME_ONLY="${REPO_NAME##*/}"

        echo "Package name: $PACKAGE_NAME"
        echo "Repository name: $REPO_NAME_ONLY"

        if [ "$PACKAGE_NAME" != "$REPO_NAME_ONLY" ]; then
          echo "Repository name ($REPO_NAME_ONLY) does not match package name ($PACKAGE_NAME)"
          echo "Skipping release - this appears to be a template-derived repository"
          echo "should_release=false" >> $GITHUB_OUTPUT
        else
          echo "Repository name matches package name, proceeding with release"
          echo "should_release=true" >> $GITHUB_OUTPUT
        fi
        echo "package_name=${PACKAGE_NAME}" >> $GITHUB_OUTPUT
      shell: bash
