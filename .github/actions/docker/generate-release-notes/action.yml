name: Generate Release Notes
description: Generates a release notes markdown file for a GitHub release.

inputs:
  version:
    description: Release version (without the v prefix)
    required: true
  container-name:
    description: Docker container name
    required: true
  package-name:
    description: Python package name
    required: true
  repository:
    description: Full repository name (owner/repo)
    required: true

outputs:
  release_notes_file:
    description: Path to the generated release notes file
    value: ${{ steps.generate.outputs.release_notes_file }}

runs:
  using: composite
  steps:
    - name: Generate release notes
      id: generate
      run: |
        sed \
          -e 's|{{VERSION}}|${{ inputs.version }}|g' \
          -e 's|{{CONTAINER_NAME}}|${{ inputs.container-name }}|g' \
          -e 's|{{PACKAGE_NAME}}|${{ inputs.package-name }}|g' \
          -e 's|{{REPOSITORY}}|${{ inputs.repository }}|g' \
          docs/RELEASE-NOTES.md > release_notes.md
        echo "release_notes_file=release_notes.md" >> $GITHUB_OUTPUT
      shell: bash
