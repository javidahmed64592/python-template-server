name: Generate Release Notes
description: Generates a release notes markdown file for a GitHub release.

inputs:
  version:
    description: Release version (without the v prefix)
    required: true
  package_name:
    description: Package name from pyproject.toml
    required: true

outputs:
  release_notes_file:
    description: Path to the generated release notes file
    value: ${{ steps.generate.outputs.release_notes_file }}

runs:
  using: composite
  steps:
    - name: Generate release notes
      id: generate
      run: |
        sed -i \
          -e 's|{{VERSION}}|${{ inputs.version }}|g' \
          -e 's|{{REPOSITORY}}|${{ github.repository }}|g' \
          -e 's|{{PACKAGE_NAME}}|${{ inputs.package_name }}|g' \
          RELEASE-NOTES.md
        echo "release_notes_file=RELEASE-NOTES.md" >> $GITHUB_OUTPUT
      shell: bash
