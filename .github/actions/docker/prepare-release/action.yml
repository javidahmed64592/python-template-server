name: Prepare Release
description: Gets package version, prepares a release directory, creates a tarball, and uploads it as an artifact.

outputs:
  package-dir:
    description: Name of the release directory and tarball (without .tar.gz)
    value: ${{ steps.get_package_info.outputs.package_dir }}

runs:
  using: composite
  steps:
    - name: Get package name and version from pyproject.toml
      id: get_package_info
      run: |
        PACKAGE_NAME=$(uv run ci-pyproject-name)
        VERSION=$(uv run ci-pyproject-version)
        echo "package_name=${PACKAGE_NAME}" >> $GITHUB_OUTPUT
        echo "package_dir=${PACKAGE_NAME}_${VERSION}" >> $GITHUB_OUTPUT
      shell: bash

    - name: Prepare release directory
      run: |
        PACKAGE_DIR="${{ steps.get_package_info.outputs.package_dir }}"
        mkdir $PACKAGE_DIR
        cp docker-compose.yml README.md LICENSE .env.example $PACKAGE_DIR/
        tree $PACKAGE_DIR --dirsfirst -F
      shell: bash

    - name: Create release tarball
      run: |
        PACKAGE_DIR="${{ steps.get_package_info.outputs.package_dir }}"
        tar -czf ${PACKAGE_DIR}.tar.gz $PACKAGE_DIR
      shell: bash

    - name: Upload release tarball
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.get_package_info.outputs.package_name }}_release
        path: ${{ steps.get_package_info.outputs.package_dir }}.tar.gz
