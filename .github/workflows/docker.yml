name: Docker

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: javidahmed64592/actions-template-python/actions/docker/build-start-services@main
      - uses: javidahmed64592/actions-template-python/actions/docker/show-logs@main

      - uses: javidahmed64592/actions-template-python/actions/docker/check-containers@main
        with:
          port: 443

      - uses: javidahmed64592/actions-template-python/actions/docker/stop-services@main

  prepare-release:
    runs-on: ubuntu-latest
    needs: [ build-docker ]

    steps:
      - uses: actions/checkout@v6
      - uses: javidahmed64592/actions-template-python/actions/setup/install-python-dev@main
      - uses: javidahmed64592/actions-template-python/actions/docker/prepare-release@main

  publish-release:
    runs-on: ubuntu-latest
    needs: [ prepare-release ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6
      - uses: javidahmed64592/actions-template-python/actions/setup/install-python-core@main
      - uses: javidahmed64592/actions-template-python/actions/docker/check-repo-name@main
        id: check_repo_name

      - uses: javidahmed64592/actions-template-python/actions/docker/get-version@main
        if: steps.check_repo_name.outputs.should_release == 'true'
        id: get_version

      - uses: javidahmed64592/actions-template-python/actions/docker/check-tag@main
        if: steps.check_repo_name.outputs.should_release == 'true'
        id: check_tag
        with:
          version: ${{ steps.get_version.outputs.version }}

      - name: Download release tarball
        if: steps.check_repo_name.outputs.should_release == 'true' &&
          steps.check_tag.outputs.tag_exists == 'false'
        uses: actions/download-artifact@v8
        with:
          name: ${{ steps.check_repo_name.outputs.package_name }}_release

      - name: Set up Docker Buildx
        if: steps.check_repo_name.outputs.should_release == 'true' &&
          steps.check_tag.outputs.tag_exists == 'false'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: steps.check_repo_name.outputs.should_release == 'true' &&
          steps.check_tag.outputs.tag_exists == 'false'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        if: steps.check_repo_name.outputs.should_release == 'true' &&
          steps.check_tag.outputs.tag_exists == 'false'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=v${{ steps.get_version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.get_version.outputs.version }}
            type=semver,pattern={{major}},value=v${{ steps.get_version.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        if: steps.check_repo_name.outputs.should_release == 'true' &&
          steps.check_tag.outputs.tag_exists == 'false'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - uses: javidahmed64592/actions-template-python/actions/docker/generate-release-notes@main
        if: steps.check_repo_name.outputs.should_release == 'true' &&
          steps.check_tag.outputs.tag_exists == 'false'
        id: release_notes
        with:
          version: ${{ steps.get_version.outputs.version }}
          package_name: ${{ steps.check_repo_name.outputs.package_name }}

      - name: Create GitHub Release
        if: steps.check_repo_name.outputs.should_release == 'true' &&
          steps.check_tag.outputs.tag_exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: "${{ github.event.repository.name }} ${{ steps.get_version.outputs.version
            }}"
          body_path: ${{ steps.release_notes.outputs.release_notes_file }}
          draft: false
          prerelease: false
          generate_release_notes: false
          files: ${{ steps.check_repo_name.outputs.package_name }}_${{
            steps.get_version.outputs.version }}.tar.gz
